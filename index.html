<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSWIL III IMPI WIJAYATIRTA KE-19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --maroon-bright: #ff1a1a;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- LIQUID BACKGROUND --- */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(60px);
            opacity: 0.4; animation: move 15s infinite alternate ease-in-out;
        }
        .blob-1 { width: 500px; height: 500px; background: #800000; top: -10%; left: -10%; }
        .blob-2 { width: 400px; height: 400px; background: #4a0000; bottom: -5%; right: -5%; animation-delay: -4s; }
        
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(60px, 40px) scale(1.2); }
        }

        .container-main {
            width: 100%;
            max-width: 420px;
            padding: 50px 24px;
            z-index: 10;
        }

        /* --- HEADER & SHINING TITLE --- */
        .header-section {
            text-align: center;
            margin-bottom: 45px;
        }
        .logo-3d {
            width: 120px; height: auto;
            margin: 0 auto 20px auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .title-glow {
            font-weight: 800;
            font-size: 20px;
            line-height: 1.4;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(
                120deg, 
                #ffffff 30%, 
                #800000 50%, 
                #ffffff 70%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- GLASS 3D BUTTONS --- */
        .glass-btn {
            width: 100%;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 16px 22px;
            margin-bottom: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: #fff;
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.3),
                inset 0 1px 1px rgba(255,255,255,0.1),
                inset 0 -2px 5px rgba(0,0,0,0.5);
        }

        .glass-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-btn:active {
            transform: scale(0.96);
        }

        .glass-btn i {
            font-size: 18px;
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .btn-text {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1.2px;
            margin-right: 35px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        /* Icons Color Customization */
        .c-wa i { color: #25D366; }
        .c-drive i { color: #FFD700; }
        .c-reg i { color: #00d2ff; }
        .c-pay i { color: #00ff88; }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin: 35px 0 18px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .section-label::before, .section-label::after {
            content: ""; height: 1px; flex: 1; background: #222;
        }

        footer {
            margin-top: 50px;
            padding-bottom: 30px;
            text-align: center;
            opacity: 0.3;
            font-size: 9px;
            letter-spacing: 4px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container-main">
        <!-- HEADER -->
        <div class="header-section">
            <img src="https://res.cloudinary.com/dr3evkwcu/image/upload/v1777902076/LOGO_IMPI_jkzwsw.png" alt="Logo IMPI" class="logo-3d">
            <h1 class="title-glow">
                MUSWIL III IMPI<br>
                WIJAYATIRTA KE-IX
            </h1>
        </div>

        <!-- CONTACT SECTION -->
        <div class="section-label">CONTACT PERSON</div>
        
        <a href="https://wa.me/6285815017660" target="_blank" class="glass-btn c-wa">
            <i class="fab fa-whatsapp"></i>
            <span class="btn-text">ACHMAD JEFFRY AL-GHIFARI</span>
        </a>

        <!-- PROPOSAL, PENDAFTARAN & PAYMENT SECTION -->
        <div class="section-label">ALUR PENDAFTARAN & ADMINISTRASI</div>

        <a href="https://drive.google.com/file/d/1bpTPAP-l8ddqzh7C-QZKFcdubMv3SqzG/view?usp=sharing" target="_blank" class="glass-btn c-drive">
            <i class="fas fa-file-pdf"></i>
            <span class="btn-text">DOWNLOAD PROPOSAL</span>
        </a>

        <a href="https://forms.gle/nCj6YUHMjdpFKAZF7" target="_blank" class="glass-btn c-reg">
            <i class="fas fa-edit"></i>
            <span class="btn-text">FORMULIR PENDAFTARAN</span>
        </a>

        <a href="https://wa.me/6281294758527" target="_blank" class="glass-btn c-pay">
            <i class="fas fa-receipt"></i>
            <span class="btn-text">KONFIRMASI PEMBAYARAN</span>
        </a>

        <footer>
            HMPS PGMI UIN MALANG • MMXXVI
        </footer>
    </div>

</body>
</html>
